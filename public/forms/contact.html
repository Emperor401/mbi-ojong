<!--
  This file is never visited by a user. It exists purely so Netlify's
  build-time bot can discover and register the "contact" form (Next.js
  renders the real form client-side, which the bot can't see). Field
  names here must match the fields sent from app/contact/page.js.
-->
<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8" /><title>Contact form (bot registration only)</title></head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field">
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="service" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
